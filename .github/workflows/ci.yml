name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify marketing automation kit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Syntax check
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Generate GTM import
        run: npm run generate:gtm -- --public-id GTM-XXXXXXX

      - name: Verify GTM import
        run: npm run verify:gtm

      - name: Reconcile example revenue
        run: npm run reconcile:revenue -- --orders examples/orders-revenue.csv --ga4 examples/ga4-revenue.csv
